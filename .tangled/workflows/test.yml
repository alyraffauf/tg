when:
  - event: ["push", "pull_request"]
    branch: ["master"]

engine: "nixery"

# The nixery image has no C compiler; tests don't need cgo (and the Nix
# package builds without it too).
environment:
  CGO_ENABLED: "0"

dependencies:
  # go.mod requires Go 1.26+; unstable tracks the latest Go release.
  nixpkgs/nixpkgs-unstable:
    - go

steps:
  - name: "Run tests"
    command: "go test ./..."
